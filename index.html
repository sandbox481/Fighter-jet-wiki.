<style>
body{margin:0;background:#001f4d;font-family:Arial,sans-serif}
header{background:#001230;color:white;padding:18px;text-align:center;border-bottom:3px solid #4a90e2}
#search{width:min(700px,90%);padding:12px;border-radius:8px;border:none}
.layout{display:flex;height:calc(100vh - 110px)}
.sidebar{width:300px;background:#002b66;overflow:auto;padding:10px}
.jet{display:block;width:100%;padding:12px;margin:4px 0;border:none;border-radius:8px;text-align:left;cursor:pointer}
.jet:hover{transform:translateX(3px)}
.main{flex:1;overflow:auto;padding:20px}
.card{background:white;border-radius:16px;padding:25px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.hero{width:100%;max-height:420px;object-fit:cover;border-radius:12px;background:#ddd}
.info{display:flex;gap:20px;flex-wrap:wrap;margin:15px 0}
.fact{background:#eef4ff;padding:10px;border-radius:8px}
.navbtn{padding:10px 16px;margin:10px;border:none;border-radius:8px;cursor:pointer}
@media(max-width:900px){.layout{flex-direction:column} .sidebar{width:auto;height:260px}}
</style>
</head>
<body>

<h1>American Fighter Jet Wiki</h1>
<input id="search" placeholder="Search aircraft...">
</header>

<div class="sidebar" id="sidebar"></div>

let current=0;

function showJet(i){
current=i;
const j=jets[i];
document.getElementById('article').innerHTML=`
<h1>${j.name}</h1>
<img class="hero" src="${j.image}" alt="${j.name}" onerror="this.alt='Add image file';">
<div class="info">
<div class="fact"><b>Manufacturer</b><br>${j.facts.manufacturer}</div>
<div class="fact"><b>Role</b><br>${j.facts.role}</div>
<div class="fact"><b>Status</b><br>${j.facts.status}</div>
</div>
${j.content}
<div>
<button class="navbtn" onclick="showJet(Math.max(0,current-1))">◀ Previous</button>
<button class="navbtn" onclick="showJet(Math.min(jets.length-1,current+1))">Next ▶</button>
</div>`;
}

function render(f=''){
const sb=document.getElementById('sidebar');
sb.innerHTML='';
jets.forEach((j,i)=>{
if(j.name.toLowerCase().includes(f.toLowerCase())){
const b=document.createElement('button');
b.className='jet';
b.textContent=j.name;
b.onclick=()=>showJet(i);
sb.appendChild(b);
}
});
}

document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render();
