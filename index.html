content: `<p>The Bell P-59 Airacomet was the first American jet-powered fighter aircraft and represented the beginning of the United States’ transition into jet aviation technology during World War II. Developed in extreme secrecy by the Bell Aircraft Corporation, the P-59 introduced turbojet propulsion to American military aviation even though its overall performance was ultimately inferior to many piston-engine fighters of the same period. The aircraft served primarily as an experimental and developmental platform that allowed American engineers, mechanics, and pilots to gain experience with jet engines, high-speed aerodynamics, and entirely new maintenance procedures that would shape future generations of combat aircraft.
 </p><p>The P-59 originated from a classified wartime project initiated after the United States obtained information about British jet engine research. American engineers worked alongside British developments involving the turbojet concepts created by Frank Whittle. Bell Aircraft was selected for the project because of its experience producing unconventional aircraft designs and because its factories could support highly secretive development work. To conceal the aircraft’s purpose, early prototypes were transported and tested under heavy security measures. The project progressed rapidly for its time, moving from concept design to flight testing in approximately two years, which was considered extremely fast for such revolutionary technology.
The P-59 used a straight-wing, mid-mounted monoplane configuration constructed primarily from aluminum alloys. Engineers designed the fuselage with a broad cross-section to accommodate two turbojet engines mounted inside the aircraft near the wing roots. Unlike later fighters that used nose or fuselage intake systems, the P-59 relied on side-mounted air intakes integrated into the fuselage. The aircraft featured tricycle landing gear, which improved ground handling and pilot visibility during taxiing compared to the tailwheel systems used on many piston-engine fighters. Its overall shape emphasized stability and ease of operation rather than extreme speed or maneuverability.
</p><p>The aircraft was powered by two General Electric J31 turbojet engines, which were derived from British centrifugal-flow engine technology. These engines operated by compressing incoming air, mixing it with fuel, igniting the mixture, and accelerating exhaust gases through the rear nozzle to generate thrust. The centrifugal compressor design used a rotating impeller to force air outward at high speed before combustion occurred. Although innovative, the engines produced relatively low thrust compared to the aircraft’s weight, limiting acceleration and climb performance. The turbojets also consumed large amounts of fuel and experienced reliability issues common among early jet engines.
Pilots reported that the P-59 possessed stable and predictable flight handling characteristics, especially at moderate speeds. The aircraft’s straight wings and relatively low wing loading provided smooth low-speed behavior and manageable stall recovery characteristics. However, its overall performance was disappointing for a jet aircraft because the engines lacked sufficient thrust to fully exploit the advantages of jet propulsion. The P-59 was slower than some advanced piston-engine fighters such as the North American P-51 Mustang and demonstrated weaker climb rates and acceleration. Even so, the aircraft provided invaluable experience with the entirely different throttle response and operational behavior of turbojets.
</p><p>The cockpit of the P-59 introduced American pilots to many systems associated with jet aviation. Instrument panels included engine temperature indicators, exhaust gas monitoring gauges, fuel pressure systems, and turbine rotational speed instruments that were not common in conventional piston-engine aircraft. Because turbojet engines responded more slowly to throttle inputs than propeller-driven engines, pilots had to learn new techniques for power management during takeoff and landing. The aircraft also used hydraulic systems for landing gear operation and other mechanical components, helping familiarize maintenance crews with the increasing complexity of future jet aircraft systems.
The P-59 was designed with combat capability in mind despite its experimental role. Planned armament included one 37 mm cannon and three .50 caliber M2 Browning machine guns mounted in the nose section. This concentrated nose-mounted arrangement improved firing accuracy because all weapons aligned directly with the pilot’s line of sight without requiring wing-mounted convergence adjustments. Engineers also considered external bomb and fuel tank carriage for potential fighter-bomber operations. However, because the aircraft never entered large-scale combat service, its weapon systems were primarily evaluated during testing rather than operational deployment.
</p><p>The P-59 was designed with combat capability in mind despite its experimental role. Planned armament included one 37 mm cannon and three .50 caliber M2 Browning machine guns mounted in the nose section. This concentrated nose-mounted arrangement improved firing accuracy because all weapons aligned directly with the pilot’s line of sight without requiring wing-mounted convergence adjustments. Engineers also considered external bomb and fuel tank carriage for potential fighter-bomber operations. However, because the aircraft never entered large-scale combat service, its weapon systems were primarily evaluated during testing rather than operational deployment.
</p><p>Most P-59 aircraft served in testing, training, and evaluation roles rather than frontline combat operations. The aircraft allowed American military pilots to transition from piston-engine aircraft into jet-powered flight before more advanced fighters entered service. Maintenance personnel used the P-59 program to develop procedures for handling turbine engines, fuel systems, and heat-resistant materials required in jet aircraft construction. The aircraft also contributed aerodynamic data involving high-speed airflow behavior, engine intake performance, and structural stress under jet-powered conditions. These lessons proved essential for future aircraft development programs.
</p><p>Although the P-59 itself was not a successful combat fighter, its influence on American aviation was extremely important. The aircraft served as a technological stepping stone that accelerated the development of later jet fighters such as the Lockheed F-80 Shooting Star. Engineers gained practical knowledge about turbojet engine integration, heat management, fuel distribution systems, and aerodynamic limitations at higher speeds. The operational experience obtained from the P-59 program also helped establish pilot training methods and maintenance doctrines for the emerging jet age. Without the P-59, the United States would have entered postwar jet competition with far less technical preparation. Fun Fact: It was so secret during WWII that it was sometimes disguised as a propeller aircraft with a fake prop bolted on the nose when parked.
</p><p>The Bell P-59 Airacomet was not a dominant combat aircraft, but it fulfilled a critical role as America’s first jet fighter and experimental jet aviation platform. Its development introduced American industry and military personnel to the engineering realities of turbojet propulsion, advanced aerodynamics, and high-speed flight operations. Even though its performance could not surpass the best piston-engine fighters of its era, the P-59 laid the technological groundwork for the rapid advancement of American jet aircraft that followed during the Cold War and beyond.
</p>`

let current=0;

function showJet(i){
current=i;
const j=jets[i];
document.getElementById('article').innerHTML=`
<h1>${j.name}</h1>
<img class="hero" src="${j.image}" alt="${j.name}" onerror="this.alt='Add image file';">
<div class="info">
<div class="fact"><b>Manufacturer</b><br>${j.facts.manufacturer}</div>
<div class="fact"><b>Role</b><br>${j.facts.role}</div>
<div class="fact"><b>Status</b><br>${j.facts.status}</div>
</div>
${j.content}
<div>
<button class="navbtn" onclick="showJet(Math.max(0,current-1))">◀ Previous</button>
<button class="navbtn" onclick="showJet(Math.min(jets.length-1,current+1))">Next ▶</button>
</div>`;
}

function render(f=''){
const sb=document.getElementById('sidebar');
sb.innerHTML='';
jets.forEach((j,i)=>{
if(j.name.toLowerCase().includes(f.toLowerCase())){
const b=document.createElement('button');
b.className='jet';
b.textContent=j.name;
b.onclick=()=>showJet(i);
sb.appendChild(b);
}
});
}

document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render();
