content: `<p>The Bell P-59 Airacomet was the first American jet-powered fighter aircraft and represented the beginning of the United States’ transition into jet aviation technology during World War II. Developed in extreme secrecy by the Bell Aircraft Corporation, the P-59 introduced turbojet propulsion to American military aviation even though its overall performance was ultimately inferior to many piston-engine fighters of the same period. The aircraft served primarily as an experimental and developmental platform that allowed American engineers, mechanics, and pilots to gain experience with jet engines, high-speed aerodynamics, and entirely new maintenance procedures that would shape future generations of combat aircraft.
 </p><p>The P-59 originated from a classified wartime project initiated after the United States obtained information about British jet engine research. American engineers worked alongside British developments involving the turbojet concepts created by Frank Whittle. Bell Aircraft was selected for the project because of its experience producing unconventional aircraft designs and because its factories could support highly secretive development work. To conceal the aircraft’s purpose, early prototypes were transported and tested under heavy security measures. The project progressed rapidly for its time, moving from concept design to flight testing in approximately two years, which was considered extremely fast for such revolutionary technology.
The P-59 used a straight-wing, mid-mounted monoplane configuration constructed primarily from aluminum alloys. Engineers designed the fuselage with a broad cross-section to accommodate two turbojet engines mounted inside the aircraft near the wing roots. Unlike later fighters that used nose or fuselage intake systems, the P-59 relied on side-mounted air intakes integrated into the fuselage. The aircraft featured tricycle landing gear, which improved ground handling and pilot visibility during taxiing compared to the tailwheel systems used on many piston-engine fighters. Its overall shape emphasized stability and ease of operation rather than extreme speed or maneuverability.
</p><p>The aircraft was powered by two General Electric J31 turbojet engines, which were derived from British centrifugal-flow engine technology. These engines operated by compressing incoming air, mixing it with fuel, igniting the mixture, and accelerating exhaust gases through the rear nozzle to generate thrust. The centrifugal compressor design used a rotating impeller to force air outward at high speed before combustion occurred. Although innovative, the engines produced relatively low thrust compared to the aircraft’s weight, limiting acceleration and climb performance. The turbojets also consumed large amounts of fuel and experienced reliability issues common among early jet engines.
Pilots reported that the P-59 possessed stable and predictable flight handling characteristics, especially at moderate speeds. The aircraft’s straight wings and relatively low wing loading provided smooth low-speed behavior and manageable stall recovery characteristics. However, its overall performance was disappointing for a jet aircraft because the engines lacked sufficient thrust to fully exploit the advantages of jet propulsion. The P-59 was slower than some advanced piston-engine fighters such as the North American P-51 Mustang and demonstrated weaker climb rates and acceleration. Even so, the aircraft provided invaluable experience with the entirely different throttle response and operational behavior of turbojets.
</p><p>The cockpit of the P-59 introduced American pilots to many systems associated with jet aviation. Instrument panels included engine temperature indicators, exhaust gas monitoring gauges, fuel pressure systems, and turbine rotational speed instruments that were not common in conventional piston-engine aircraft. Because turbojet engines responded more slowly to throttle inputs than propeller-driven engines, pilots had to learn new techniques for power management during takeoff and landing. The aircraft also used hydraulic systems for landing gear operation and other mechanical components, helping familiarize maintenance crews with the increasing complexity of future jet aircraft systems.
The P-59 was designed with combat capability in mind despite its experimental role. Planned armament included one 37 mm cannon and three .50 caliber M2 Browning machine guns mounted in the nose section. This concentrated nose-mounted arrangement improved firing accuracy because all weapons aligned directly with the pilot’s line of sight without requiring wing-mounted convergence adjustments. Engineers also considered external bomb and fuel tank carriage for potential fighter-bomber operations. However, because the aircraft never entered large-scale combat service, its weapon systems were primarily evaluated during testing rather than operational deployment.
</p><p>The P-59 was designed with combat capability in mind despite its experimental role. Planned armament included one 37 mm cannon and three .50 caliber M2 Browning machine guns mounted in the nose section. This concentrated nose-mounted arrangement improved firing accuracy because all weapons aligned directly with the pilot’s line of sight without requiring wing-mounted convergence adjustments. Engineers also considered external bomb and fuel tank carriage for potential fighter-bomber operations. However, because the aircraft never entered large-scale combat service, its weapon systems were primarily evaluated during testing rather than operational deployment.
</p><p>Most P-59 aircraft served in testing, training, and evaluation roles rather than frontline combat operations. The aircraft allowed American military pilots to transition from piston-engine aircraft into jet-powered flight before more advanced fighters entered service. Maintenance personnel used the P-59 program to develop procedures for handling turbine engines, fuel systems, and heat-resistant materials required in jet aircraft construction. The aircraft also contributed aerodynamic data involving high-speed airflow behavior, engine intake performance, and structural stress under jet-powered conditions. These lessons proved essential for future aircraft development programs.
</p><p>Although the P-59 itself was not a successful combat fighter, its influence on American aviation was extremely important. The aircraft served as a technological stepping stone that accelerated the development of later jet fighters such as the Lockheed F-80 Shooting Star. Engineers gained practical knowledge about turbojet engine integration, heat management, fuel distribution systems, and aerodynamic limitations at higher speeds. The operational experience obtained from the P-59 program also helped establish pilot training methods and maintenance doctrines for the emerging jet age. Without the P-59, the United States would have entered postwar jet competition with far less technical preparation. Fun Fact: It was so secret during WWII that it was sometimes disguised as a propeller aircraft with a fake prop bolted on the nose when parked.
</p><p>The Bell P-59 Airacomet was not a dominant combat aircraft, but it fulfilled a critical role as America’s first jet fighter and experimental jet aviation platform. Its development introduced American industry and military personnel to the engineering realities of turbojet propulsion, advanced aerodynamics, and high-speed flight operations. Even though its performance could not surpass the best piston-engine fighters of its era, the P-59 laid the technological groundwork for the rapid advancement of American jet aircraft that followed during the Cold War and beyond.
</p>`

content: `<p>The Lockheed F-80 Shooting Star was the first operational American jet fighter to enter full squadron service and marked the transition of the United States Air Force from piston-engine combat aircraft into the jet age. Designed during the final years of World War II by Clarence Kelly Johnson and Lockheed’s Skunk Works division, the aircraft combined straight-wing aerodynamics, a turbojet propulsion system, and a streamlined fuselage optimized for high-speed flight. Although it arrived too late to see major combat in World War II, the F-80 became extremely important during the early Cold War and the Korean War, where it operated as both a fighter and ground-attack aircraft.
</p><p>The F-80 used an all-metal semi-monocoque fuselage construction that increased structural strength while reducing excess weight compared to many late-war piston fighters. Its fuselage was built around a central air intake system that directed airflow into the turbojet engine through side-mounted intake ducts located in the wing roots. The aircraft featured straight laminar-flow wings with a low-mounted configuration that improved stability and handling at high subsonic speeds. Engineers designed the wing to provide predictable stall characteristics and effective low-altitude maneuverability, though the straight-wing layout later limited the aircraft’s transonic performance compared to swept-wing Soviet fighters.
</p><p>Power for the F-80 came primarily from the Allison J33 turbojet engine, which was derived from the British Rolls-Royce Derwent design. The engine operated using axial airflow principles where incoming air was compressed, mixed with fuel, ignited, and expelled through the exhaust nozzle to generate thrust. Early variants produced around 4,000 pounds of thrust, while later versions exceeded 5,000 pounds with water-alcohol injection systems for temporary power increases during takeoff or combat. The turbojet gave the aircraft a maximum speed of approximately 600 miles per hour, making it one of the fastest operational fighters in the world during the late 1940s.
</p><p>The cockpit of the F-80 introduced pilots to many technologies that later became standard in jet aviation. It used a pressurized canopy system that improved pilot endurance during high-altitude operations and reduced fatigue caused by oxygen deprivation. Flight instrumentation included engine temperature gauges, fuel flow indicators, hydraulic pressure monitors, and advanced gunsight systems designed specifically for high-speed aerial combat. The aircraft also featured hydraulically assisted control surfaces, allowing pilots to maintain maneuverability at speeds where purely mechanical controls would become excessively heavy. The bubble canopy provided exceptional visibility, which was critical during dogfights and ground attack missions.
</p><p>The F-80 carried six .50 caliber M3 Browning machine guns mounted in the nose section, giving the aircraft concentrated forward firepower with minimal convergence issues. Each gun could fire at a high cyclic rate, creating dense streams of ammunition effective against aircraft and ground targets. The aircraft also possessed underwing hardpoints capable of carrying bombs, rockets, or external fuel tanks. During the Korean War, F-80s frequently carried High Velocity Aircraft Rockets (HVARs) and conventional bombs for close air support missions. The integration of internal guns and external ordnance made the aircraft adaptable to multiple mission profiles beyond pure interception duties.
</p><p>One of the major engineering challenges of early jet aircraft was fuel consumption, and the F-80 demonstrated both the advantages and limitations of first-generation turbojets. Internal fuel tanks were distributed throughout the fuselage and wings to maintain center-of-gravity balance during flight. Because turbojet engines consumed fuel rapidly at high thrust settings, the aircraft often relied on detachable external drop tanks to extend operational range. These external tanks could be jettisoned before combat to reduce drag and improve maneuverability. Even with added fuel capacity, the F-80’s combat endurance remained relatively limited compared to piston-engine fighters, influencing tactical mission planning.
</p><p>Aerodynamically, the F-80 represented a major leap forward for American aviation engineering. The aircraft’s streamlined fuselage minimized drag while maintaining stable airflow into the engine intakes. Engineers carefully shaped the nose and canopy to reduce turbulence at high speed, while the straight-wing configuration delivered stable low-speed handling characteristics. However, as aircraft speeds approached the transonic region near the speed of sound, compressibility effects created control difficulties and increased drag. These limitations became especially apparent during encounters with the swept-wing Soviet MiG-15, which possessed superior high-altitude and high-speed performance.
</p><p>The technological lessons learned from the F-80 directly influenced later American jet development programs. Its engine integration methods, tricycle landing gear arrangement, cockpit layout, and hydraulic control systems became foundational features for future fighters. The aircraft also served as the basis for the T-33 trainer variant, one of the most successful jet trainers ever produced. Experience gained from operating the F-80 helped engineers improve swept-wing aerodynamics, jet engine reliability, and high-speed combat tactics during the early Cold War. Although quickly surpassed by newer fighters, the F-80 remains historically significant as the aircraft that introduced the United States military to practical jet-powered combat aviation.
</p>`

content: `<p>The North American F-86 Sabre was one of the most influential fighter aircraft of the early Cold War and became internationally recognized for its combat performance during the Korean War. Developed by North American Aviation, the F-86 introduced advanced swept-wing aerodynamics, high-speed maneuverability, and improved jet engine performance that allowed it to compete directly against Soviet-designed jet fighters such as the MiG-15. The aircraft combined transonic flight capability, heavy armament, hydraulic flight controls, and radar-assisted gunsight systems into a highly effective air superiority platform that shaped the development of modern fighter aviation.</p><p>One of the most important technical features of the F-86 was its 35-degree swept-wing configuration. Engineers adopted the swept-wing design after studying captured German aerodynamic research conducted during World War II. Swept wings reduced the effective airflow velocity over the wing surface as aircraft approached transonic speeds, delaying compressibility effects and reducing drag near the speed of sound. This allowed the F-86 to achieve significantly better high-speed performance than earlier straight-wing jet fighters. The wing also incorporated automatic leading-edge slats that extended during low-speed maneuvering, improving lift generation and enhancing turning performance during combat.
The F-86 was powered by the General Electric J47 axial-flow turbojet engine, one of the most successful early American jet engines. Unlike earlier centrifugal-flow engines, the axial-flow design compressed air through multiple rotating compressor stages aligned along the engine axis, allowing greater airflow efficiency and higher thrust output. Depending on the variant, the engine produced over 5,000 pounds of thrust and enabled the aircraft to exceed 680 miles per hour. Later versions used afterburner systems that injected additional fuel into the exhaust stream to generate temporary increases in thrust during combat maneuvers and high-speed interceptions.
</p><p>The aircraft incorporated hydraulically boosted flight controls that allowed pilots to maneuver effectively at speeds where aerodynamic forces would otherwise make manual controls extremely difficult to operate. The F-86 featured an all-flying tailplane, also called a stabilator, which provided improved pitch authority at transonic speeds. This design solved many of the control problems experienced by earlier jet aircraft near the sound barrier. Pilots considered the aircraft highly responsive and stable, with excellent roll performance and smooth high-speed handling. These characteristics made the F-86 especially effective in aerial dogfights against enemy fighters.
</p><p>The cockpit of the F-86 introduced several advanced technologies that improved combat effectiveness. One of the most important systems was the A-1CM radar-assisted gunsight, which used a ranging radar to automatically calculate lead angles for air-to-air gunnery. This significantly increased hit probability during high-speed engagements where manual aiming calculations were extremely difficult. The cockpit also featured pressurization systems, ejection seats, and improved instrument layouts optimized for jet combat operations. Pilots benefited from excellent visibility provided by the bubble canopy, allowing greater situational awareness during maneuvering combat.
</p><p>Most F-86 variants carried six .50 caliber M3 Browning machine guns mounted in the nose section. These weapons delivered high rates of fire and concentrated forward firepower ideal for engaging enemy aircraft. Ammunition storage systems allowed sustained firing bursts during combat, while gun placement simplified aiming by eliminating wing convergence problems. Later variants of the Sabre also gained the ability to carry bombs, rockets, and external fuel tanks on underwing hardpoints. Some versions were modified for nuclear strike missions, demonstrating the aircraft’s adaptability beyond air superiority roles.
</p><p>The F-86 became famous during the Korean War for its battles against the Soviet-built Mikoyan-Gurevich MiG-15 in the area known as “MiG Alley.” The Sabre possessed superior roll rate, diving capability, and high-speed handling, while the MiG-15 generally held advantages in climb rate and high-altitude performance. American pilots used the F-86’s strengths in energy retention and maneuverability to counter Soviet tactics effectively. The aircraft achieved one of the highest kill ratios of the war and demonstrated that advanced pilot training combined with superior aircraft systems could dominate jet air combat.
</p><p>Structurally, the F-86 used a reinforced aluminum airframe designed to withstand the aerodynamic stresses of high-speed jet operations. Engineers strengthened critical load-bearing sections around the wings, engine mounts, and landing gear assemblies to handle repeated combat maneuvers and high-G forces. Maintenance crews valued the aircraft for its relatively accessible engine compartment and modular component layout, which simplified repairs and reduced turnaround time between missions. Continuous improvements to hydraulic systems, fuel systems, and engine reliability increased operational readiness throughout the aircraft’s service life.
</p><p>The F-86 had a major influence on global fighter development during the 1950s and beyond. Its swept-wing aerodynamics, stabilator control system, and transonic combat performance established design principles later used in aircraft such as the McDonnell Douglas F-4 Phantom II and North American F-100 Super Sabre. The aircraft was exported to numerous allied nations and remained operational for decades in several air forces worldwide. The Sabre proved that jet fighters could achieve reliable high-speed combat performance while maintaining maneuverability, survivability, and operational flexibility in large-scale military service.
</p>`

content: `<p>The Republic F-84 Thunderjet was one of the earliest operational American jet fighters designed for both air combat and ground attack missions during the early Cold War. Developed by Republic Aviation, the F-84 became known for its rugged airframe, heavy ordnance capability, and long-range strike performance. Although originally intended as a high-speed escort fighter, the aircraft evolved primarily into a fighter-bomber platform capable of delivering bombs, rockets, and later tactical nuclear weapons. The Thunderjet played a major role during the Korean War and helped establish the fighter-bomber doctrine used by the United States Air Force throughout the 1950s.</p><p>The F-84 used a straight-wing monoplane configuration built around a reinforced aluminum semi-monocoque fuselage structure. Engineers designed the aircraft with thick straight wings that provided strong internal volume for fuel storage while also supporting heavy external ordnance loads. The fuselage featured a circular nose intake system that directed airflow directly into the turbojet engine mounted centrally within the aircraft. Structurally, the Thunderjet was designed for durability and survivability during low-altitude attack missions, allowing it to absorb greater aerodynamic and combat stress than many earlier jet fighters. Its tricycle landing gear arrangement also improved ground stability and visibility during takeoff and landing operations.

</p><p>One of the defining technical characteristics of the F-84 was its unusually large fuel capacity for an early jet fighter. Engineers recognized that turbojet engines consumed fuel rapidly, especially during high-thrust operations, so the aircraft incorporated both large internal fuel tanks and external drop tank capability. Distinctive wingtip-mounted fuel tanks became a common feature on many F-84 variants. These tanks reduced wing stress during flight while extending operational range considerably. The aircraft’s long-range capability allowed it to perform escort missions, deep strike operations, and extended battlefield support roles that many early jets could not accomplish effectively.
</p><p>The cockpit of the F-84 incorporated advanced instrumentation for jet combat and navigation during the late 1940s and early 1950s. Pilots monitored turbine temperature, fuel pressure, hydraulic systems, and engine rotational speed through dedicated instrument panels designed specifically for turbojet operation. The aircraft used hydraulic assistance for flight controls and landing gear systems, improving pilot control at higher speeds. Later variants introduced improved navigation equipment and gunsight systems that increased bombing and strafing accuracy. The cockpit canopy provided relatively good visibility, which was especially important during low-level attack missions against ground targets.
</p><p>The F-84 carried six .50 caliber M3 Browning machine guns mounted in the wings, giving the aircraft substantial forward firepower against both air and ground targets. Its most important feature, however, was its heavy external ordnance capacity. Underwing hardpoints allowed the aircraft to carry bombs, High Velocity Aircraft Rockets (HVARs), napalm tanks, and additional fuel tanks simultaneously. Later versions gained the ability to deploy tactical nuclear weapons under NATO strike doctrines. This combination of firepower and payload made the Thunderjet one of the earliest highly effective jet-powered fighter-bombers in American service.
</p><p>During the Korean War, the F-84 transitioned primarily into the ground attack role because newer swept-wing fighters such as the North American F-86 Sabre proved more effective in air superiority combat against the MiG-15. Thunderjets conducted large numbers of close air support, interdiction, and infrastructure strike missions against enemy supply lines, bridges, railroads, and troop concentrations. The aircraft’s rugged structure allowed it to survive extensive anti-aircraft fire during low-altitude attacks. Pilots valued the F-84 for its predictable flight handling, bombing stability, and ability to carry large combat payloads deep into enemy territory.</p><p>The operational experience gained from the straight-wing F-84 directly influenced the development of the swept-wing Republic F-84F Thunderstreak. Engineers determined that higher-speed performance required improved transonic aerodynamics and reduced drag near the speed of sound. The swept-wing redesign introduced a more powerful engine, revised fuselage shape, and improved high-speed flight characteristics. Although technically a development of the Thunderjet family, the F-84F represented a major aerodynamic evolution and demonstrated how rapidly jet aircraft technology advanced during the early Cold War.
The F-84 played an important role in shaping postwar American tactical air doctrine. Its long-range strike capability, nuclear delivery potential, and multi-role adaptability influenced future fighter-bomber designs such as the Republic F-105 Thunderchief. The aircraft also helped NATO air forces transition into jet-powered operations, with many allied nations operating Thunderjets during the 1950s. Lessons learned from the F-84 program improved fuel system design, jet engine maintenance procedures, and tactical strike coordination methods that became standard during the Cold War.
</p>`

content: `<p>The Grumman F9F Panther was one of the United States Navy’s first successful carrier-based jet fighters and became a major combat aircraft during the Korean War. Developed by Grumman, the F9F combined rugged naval construction, reliable jet propulsion, and stable flight characteristics optimized for aircraft carrier operations. Unlike many early jet fighters that focused purely on speed, the Panther emphasized durability, operational reliability, and low-speed handling, making it highly effective for carrier launches, arrested landings, ground attack missions, and fleet air defense. The aircraft became a key step in transitioning naval aviation from piston-engine fighters into the jet age.

</p><p>The F9F Panther became one of the primary jet fighters used by the United States Navy during the Korean War. It performed air superiority patrols, escort missions, reconnaissance flights, and ground attack operations from aircraft carriers positioned offshore. The Panther achieved the Navy’s first jet-versus-jet aerial victory when a Panther pilot shot down a MiG-15 in 1950. Although the MiG-15 possessed superior speed and climb performance, the Panther remained highly effective in strike operations due to its rugged structure and dependable low-altitude handling. Naval aviators valued the aircraft for its survivability and operational reliability under combat conditions.
</p><p>Carrier aviation placed extreme demands on aircraft maintenance systems, and the F9F was designed with operational practicality in mind. Maintenance crews could access engine compartments and hydraulic systems relatively efficiently despite the confined spaces aboard aircraft carriers. The aircraft’s rugged construction reduced structural fatigue caused by repeated carrier operations, while corrosion-resistant materials helped protect the airframe from saltwater exposure. Its engine demonstrated greater reliability than many earlier turbojets, reducing mechanical failures during deployment cycles. These factors contributed to high sortie generation rates during sustained naval operations.

</p>`

content: `<p>The F3D Skyknight used a wide, straight-wing mid-fuselage design that emphasized internal volume for radar equipment and twin engines. Its fuselage was unusually large for a fighter, allowing space for a two-person crew seated side-by-side rather than in tandem, improving coordination between pilot and radar operator. The aircraft featured a strong, reinforced structure designed to withstand carrier landings and the added weight of early radar systems. Its landing gear was heavily reinforced and widely spaced, giving it exceptional ground stability compared to many early jet fighters.
</p><p>The Skyknight was powered by two Westinghouse J34 turbojet engines mounted in the lower fuselage. This twin-engine arrangement provided redundancy and improved safety during overwater and night operations, which were critical for naval missions. Each engine used an axial-flow compressor design that improved efficiency over earlier centrifugal systems, though thrust output remained relatively modest. While not designed for high-speed performance, the dual engines provided smooth and stable power delivery, which was ideal for radar-guided interception missions rather than aggressive air combat maneuvering.
</p><p>The F3D was engineered for stability rather than speed, resulting in a forgiving and highly predictable flight envelope. Its straight wings provided strong lift at lower speeds, making it suitable for carrier approaches and controlled nighttime landings. The aircraft’s large fuselage contributed to aerodynamic drag, limiting its top speed compared to lighter jet fighters. However, this same design improved directional stability, allowing radar operators to maintain consistent tracking of enemy targets during interception missions.
</p><p>The most critical technological feature of the Skyknight was its AN/APQ-35 radar system, one of the most advanced airborne radar suites of its time. This system allowed the aircraft to detect, track, and engage enemy aircraft in complete darkness or poor visibility conditions. The radar operator worked closely with the pilot to guide interception runs, using onboard displays to calculate target position and closure rates. This made the F3D one of the first truly effective all-weather jet fighters, capable of operating independently of visual conditions.
</p><p>The side-by-side cockpit arrangement was a defining feature of the Skyknight and significantly improved operational effectiveness. The pilot and radar operator shared a wide cockpit space, allowing rapid communication and coordinated decision-making during interceptions. The cockpit included early jet-era instrumentation such as engine temperature gauges, fuel flow monitors, and radar display consoles. The aircraft also featured a pressurized cabin, enabling high-altitude operations and improving crew endurance during long night patrol missions.
</p><p>The F3D carried four 20 mm M3 autocannons mounted in the lower fuselage, providing concentrated forward firepower for interception missions. This configuration ensured all weapons were aligned with the aircraft’s centerline, improving accuracy during radar-guided attack runs. The aircraft also had limited capability for carrying external ordnance such as rockets and bombs, although it was primarily optimized for air-to-air combat. Its weapon system was designed to complement radar tracking, allowing pilots to engage targets without visual contact.</p><p>During the Korean War, the Skyknight played a crucial role as a night interceptor and electronic warfare support aircraft. It was one of the few jets capable of reliably engaging enemy aircraft in darkness, often defending strategic areas from nighttime raids. The aircraft also became important in disrupting enemy radar and communications systems, contributing to broader air superiority efforts. Although slower than many contemporary fighters, its radar-guided interception capability made it highly effective against enemy bombers and reconnaissance aircraft.
</p><p>The F3D Skyknight influenced later generations of all-weather and night-fighting aircraft, including the McDonnell F-4 Phantom II, which expanded on its radar-guided combat philosophy. Its emphasis on crew coordination, advanced avionics integration, and all-weather capability helped define future interceptor design principles. The aircraft also demonstrated the importance of radar as a primary combat tool rather than a secondary aid. Even after being replaced in frontline service, the Skyknight remained influential in shaping electronic warfare and night combat doctrine.
</p>`

let current=0;

function showJet(i){
current=i;
const j=jets[i];
document.getElementById('article').innerHTML=`
<h1>${j.name}</h1> 
<div class="info">
<div class="fact"><b>Manufacturer</b><br>${j.facts.manufacturer}</div>
<div class="fact"><b>Role</b><br>${j.facts.role}</div>
<div class="fact"><b>Status</b><br>${j.facts.status}</div>
</div>
${j.content}
<div>
<button class="navbtn" onclick="showJet(Math.max(0,current-1))">◀ Previous</button>
<button class="navbtn" onclick="showJet(Math.min(jets.length-1,current+1))">Next ▶</button>
</div>`;
}

function render(f=''){
const sb=document.getElementById('sidebar');
sb.innerHTML='';
jets.forEach((j,i)=>{
if(j.name.toLowerCase().includes(f.toLowerCase())){
const b=document.createElement('button');
b.className='jet';
b.textContent=j.name;
b.onclick=()=>showJet(i);
sb.appendChild(b);
}
});
}

document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render();
